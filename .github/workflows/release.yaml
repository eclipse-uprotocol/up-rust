# Create release artifacts and publish to crates.io.

name: Release

on:
  push:
    tags:
      - v*

concurrency:
  group: "release-${{ github.head_ref || github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read # needed for checking out the code

jobs:
  check:
    uses: ./.github/workflows/check.yaml

  check-msrv:
    uses: eclipse-uprotocol/ci-cd/.github/workflows/rust-verify-msrv.yaml@ad3f99eac0675c714f08c473412dae14d9fecaa8 # main

  coverage:
    uses: eclipse-uprotocol/ci-cd/.github/workflows/rust-coverage.yaml@ad3f99eac0675c714f08c473412dae14d9fecaa8 # main

  current-spec-compliance:
    uses: eclipse-uprotocol/ci-cd/.github/workflows/requirements-tracing.yaml@ad3f99eac0675c714f08c473412dae14d9fecaa8 # main
    with:
      env-file-suffix: "oft-current"

  licenses:
    # This works off the license declarations in dependent packages/crates, so if these declarations are wrong, this report will contain erroneous information
    uses: eclipse-uprotocol/ci-cd/.github/workflows/rust-license-report.yaml@ad3f99eac0675c714f08c473412dae14d9fecaa8 # main
    with:
      templates: "about.hbs"
      config: "about.toml"

  tag_release_artifacts:
    # This only runs if this workflow is initiated via a tag-push with pattern 'v*'
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    name: collect v-tag release artifacts
    runs-on: ubuntu-latest
    needs: 
      - check
      - check-msrv
      - coverage
      - current-spec-compliance
      - licenses
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: "recursive"
          persist-credentials: false

      - name: "Determine uProtocol Specification file patterns from .env file"
        uses: falti/dotenv-action@fff81fa3263fb96221c521b5e526e57c0c56d760 # v1.2.1
        with:
          path: .env.oft-current
          export-variables: true
          keys-case: bypass

      # License report - we later need the download_url output of the upload step
      - name: Download license report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: license-report
          path: dist/license/
      - name: Upload license report to release
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # 2.11.5
        id: upload_license_report
        with:
          file: dist/license/*
          file_glob: true

      # Requirements Tracing report - we later need the download_url output of the upload step
      - name: Download requirements tracing report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tracing-report-html
          path: dist/tracing/
      - name: Upload requirements tracing report to release
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # 2.11.5
        id: upload_requirements_tracing_report
        with:
          file: dist/tracing/*
          file_glob: true

      # Test results - we later need the download_url output of the upload step
      - name: Download test report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: test-results
          path: dist/tests/
      - name: Upload test report to release
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # 2.11.5
        id: upload_test_report
        with:
          file: dist/tests/*
          file_glob: true

      # Test coverage - we later need the download_url output of the upload step
      - name: Download test coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: code-coverage-html
          path: dist/codecov/
      - name: Upload test coverage to release
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # 2.11.5
        id: upload_test_coverage
        with:
          file: dist/codecov/*
          file_glob: true

      # README - we later need the download_url output of the upload step
      - name: Upload README to release
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # 2.11.5
        id: upload_readme
        with:
          file: README.md

      - name: Gather uProtocol Specification documents
        shell: bash
        run: |
          tar cvz --file up-spec.tar.gz ${{ env.UP_SPEC_FILE_PATTERNS }}
      - name: Upload relevant uProtocol Spec files to release
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # 2.11.5
        id: upload_up_spec
        with:
          file: up-spec.tar.gz

      - name: Gets latest created release info
        id: latest_release_info
        uses: joutvhu/get-release@8c3531bba0d249f5e7c3d7e1954d34db9edf2a90 # v1.0.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect quality artifacts
        uses: eclipse-dash/quevee@b62d7faa1cf68654758754aaed8616b19f227583 # v1.0.0
        id: quevee_manifest
        with:
          release_url: ${{ steps.latest_release_info.outputs.html_url }}
          artifacts_documentation: ${{ steps.upload_up_spec.outputs.browser_download_url }}
          artifacts_readme: ${{ steps.upload_readme.outputs.browser_download_url }}
          artifacts_requirements: ${{ steps.upload_up_spec.outputs.browser_download_url }}
          artifacts_testing: ${{ steps.upload_test_report.outputs.browser_download_url }},${{ steps.upload_test_coverage.outputs.browser_download_url }},${{ steps.upload_requirements_tracing_report.outputs.browser_download_url }}

      - name: Upload manifest to release
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # 2.11.5
        id: upload_quality_manifest
        with:
          file: ${{ steps.quevee_manifest.outputs.manifest_file }}

  # Publish crate to crates.io - this will only do a dry-run to verify that the publish would succeed, if the
  # CRATES_IO_DRY_RUN environment variable is set to a value that GitHub Actions evaluates to 'true'
  # (see https://docs.github.com/en/actions/reference/workflows-and-actions/expressions#literals).
  # Otherwise the job will try to actually publish the crate "for real".
  cargo-publish:
    name: Publish to crates.io
    # This will publish to crates.io if secrets.CRATES_TOKEN is set in the workspace, otherwise do a dry-run
    runs-on: ubuntu-latest
    needs:
      - tag_release_artifacts
    permissions:
      id-token: write # needed for cargo publish with OIDC token
    env:
      DRY_RUN: ${{ vars.CRATES_IO_DRY_RUN || 'false' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: "recursive"
          persist-credentials: false
      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: auth
      - if: env.DRY_RUN
        run: cargo publish --all-features --dry-run
      - if: ! env.DRY_RUN
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --all-features --token ${CARGO_REGISTRY_TOKEN}
